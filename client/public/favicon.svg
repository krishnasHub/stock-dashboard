<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- dark background pill -->
  <rect width="32" height="32" rx="8" fill="#0f172a"/>

  <!-- area chart fill -->
  <path d="M3 24 L3 18 L9 14 L14 16 L20 9 L26 12 L29 8 L29 24 Z"
        fill="#22c55e" fill-opacity="0.25"/>

  <!-- area chart line -->
  <polyline points="3,18 9,14 14,16 20,9 26,12 29,8"
            stroke="#22c55e" stroke-width="2.2"
            stroke-linejoin="round" stroke-linecap="round"
            fill="none"/>

  <!-- candlestick 1 (green) -->
  <line x1="8" y1="11" x2="8" y2="22" stroke="#22c55e" stroke-width="1.2"/>
  <rect x="6" y="13" width="4" height="6" rx="0.5" fill="#22c55e"/>

  <!-- candlestick 2 (red) -->
  <line x1="16" y1="10" x2="16" y2="21" stroke="#ef4444" stroke-width="1.2"/>
  <rect x="14" y="13" width="4" height="5" rx="0.5" fill="#ef4444"/>

  <!-- candlestick 3 (green) -->
  <line x1="24" y1="8" x2="24" y2="19" stroke="#22c55e" stroke-width="1.2"/>
  <rect x="22" y="10" width="4" height="6" rx="0.5" fill="#22c55e"/>
</svg>
